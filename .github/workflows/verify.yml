name: Verify

on:
  push:
    branches: [main]
  pull_request:

jobs:
  prototype:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Check core formatting
        run: npm run format:check:core

      - name: Verify prototype
        run: npm run verify:prototype
