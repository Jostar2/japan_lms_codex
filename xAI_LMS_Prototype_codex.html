<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claritas · 설명 가능한 대학 AI LMS</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-jp.css" />
<style>
/* ───────────────────────── DESIGN TOKENS (Claude brand) ───────────────────────── */
:root{
  --bg: #faf9f5;
  --surface: #ffffff;
  --surface-2: #f4f2ec;
  --surface-3: #eceae1;
  --ink: #1f1e1c;
  --ink-2: #3d3c38;
  --ink-3: #6e6c66;
  --ink-4: #a8a59d;
  --line: #e6e3d9;
  --line-2: #dcd8ca;

  --claude: #c15f3c;           /* Claude signature orange */
  --claude-soft: #f3e0d5;
  --claude-ink: #7a3620;

  --student: #2f7a5a;          /* forest green - Student persona */
  --student-soft: #dff0e7;
  --student-ink: #164d36;

  --instructor: #4a3fa8;       /* deep indigo - Instructor persona */
  --instructor-soft: #e7e4f6;
  --instructor-ink: #2a2370;

  --danger: #b4452c;
  --danger-soft: #f8e1d8;
  --warn: #a66a12;
  --warn-soft: #fae8cc;
  --ok: #2f7a5a;
  --ok-soft: #dff0e7;
  --xai: #6d4dbd;              /* xAI purple */
  --xai-soft: #ece6f9;

  --radius-sm: 6px;
  --radius: 10px;
  --radius-lg: 14px;
  --radius-xl: 20px;

  --shadow-1: 0 1px 0 rgba(20,18,14,.04), 0 1px 2px rgba(20,18,14,.03);
  --shadow-2: 0 1px 0 rgba(20,18,14,.04), 0 2px 4px rgba(20,18,14,.04), 0 6px 16px -4px rgba(20,18,14,.06);
  --shadow-3: 0 2px 0 rgba(20,18,14,.06), 0 8px 24px -4px rgba(20,18,14,.12), 0 20px 60px -10px rgba(20,18,14,.18);
  --shadow-inset: inset 0 0 0 1px rgba(20,18,14,.04);
  --ease-std: cubic-bezier(.2,.6,.2,1);
  --ease-out: cubic-bezier(.16,.84,.44,1);

  --font-serif: "Pretendard JP Variable","Pretendard JP","Pretendard", "Apple SD Gothic Neo", sans-serif;
  --font-sans: "Pretendard JP Variable","Pretendard JP","Pretendard", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Segoe UI", sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font-sans);
  background:var(--bg);
  color:var(--ink);
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  font-size:14px;
  line-height:1.55;
  letter-spacing:-0.005em;
}
button{font:inherit;color:inherit;background:none;border:0;cursor:pointer}
a{color:inherit;text-decoration:none}
input,textarea,select{font:inherit;color:inherit}

/* ───────────────────────── APP SHELL ───────────────────────── */
.app{
  display:grid;
  grid-template-columns: 248px 1fr 344px;
  grid-template-rows: 60px 1fr;
  grid-template-areas:
    "topbar topbar topbar"
    "nav main aside";
  height:100vh;
  min-width:1320px;
  transition:grid-template-columns .24s var(--ease-out);
}
.app.no-aside{ grid-template-columns: 240px 1fr; grid-template-areas: "topbar topbar" "nav main"; }
.app.nav-collapsed{
  grid-template-columns:72px minmax(0,1fr) 344px;
}
.app.ai-expanded{
  grid-template-columns:248px minmax(560px,1fr) minmax(440px,480px);
}
.app.nav-collapsed.ai-expanded,
.app.ai-focus{
  grid-template-columns:72px minmax(560px,1fr) minmax(440px,480px);
}
.app.nav-collapsed.no-aside,
.app.ai-focus.no-aside{ grid-template-columns:72px 1fr; }

@media (prefers-reduced-motion: reduce){
  .app{transition:none}
}

/* ── TOP BAR ── */
.topbar{
  grid-area:topbar;
  display:flex;align-items:center;gap:20px;
  padding:0 24px;
  background:rgba(255,255,255,.86);
  backdrop-filter:saturate(1.2) blur(10px);
  -webkit-backdrop-filter:saturate(1.2) blur(10px);
  border-bottom:1px solid var(--line);
  z-index:10;
}
.brand{display:flex;align-items:center;gap:10px;min-width:210px;padding-right:6px}
.brand-mark{
  width:30px;height:30px;border-radius:9px;
  background:linear-gradient(150deg,#e8b997 0%,#d57a4f 45%,#b65032 100%);
  display:grid;place-items:center;
  color:#fff;font-family:var(--font-serif);font-weight:800;font-size:15px;letter-spacing:-.03em;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,.2), inset 0 -1px 0 rgba(0,0,0,.08), 0 1px 2px rgba(193,95,60,.3), 0 2px 8px -2px rgba(193,95,60,.3);
  position:relative;
}
.brand-name{font-family:var(--font-serif);font-weight:700;font-size:17px;letter-spacing:-.025em;line-height:1.1}
.brand-tag{font-size:10px;color:var(--ink-4);letter-spacing:.1em;text-transform:uppercase;margin-top:1px;font-weight:500}

.search-bar{
  flex:1;min-width:0;max-width:820px;
  display:flex;align-items:center;gap:10px;
  padding:8px 16px;
  background:var(--surface-2);
  border:1px solid transparent;
  border-radius:999px;
  color:var(--ink-3);
  font-size:12.5px;
  white-space:nowrap;overflow:hidden;
  transition:background .15s, border-color .15s, box-shadow .15s;
}
.search-bar > span:nth-child(2){flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis}
.search-bar:focus-within{background:#fff;border-color:var(--claude);box-shadow:0 0 0 4px rgba(193,95,60,.08)}
.search-bar:hover{border-color:var(--line-2);background:var(--surface)}
.search-bar .kbd{margin-left:auto;display:flex;gap:3px}
.kbd span{background:#fff;border:1px solid var(--line);border-radius:4px;padding:0 5px;font-size:10.5px;color:var(--ink-3);font-family:var(--font-sans)}

.view-switch{
  display:flex;gap:2px;padding:3px;
  background:var(--surface-2);border:1px solid var(--line);border-radius:999px;
  box-shadow:inset 0 1px 0 rgba(20,18,14,.02);
}
.view-switch button{
  padding:6px 14px;border-radius:999px;
  font-size:12px;font-weight:500;color:var(--ink-3);
  display:inline-flex;align-items:center;gap:7px;
  transition:background .2s var(--ease-out), color .2s var(--ease-out), box-shadow .2s var(--ease-out);
}
.view-switch button:hover{color:var(--ink-2)}
.view-switch button.active{background:#fff;color:var(--ink);box-shadow:0 1px 0 rgba(20,18,14,.04),0 1px 2px rgba(20,18,14,.05),0 2px 6px -1px rgba(20,18,14,.05);font-weight:600}
.view-switch .dot{width:7px;height:7px;border-radius:50%;box-shadow:0 0 0 1px rgba(255,255,255,.5)}
.view-switch .dot.s{background:var(--student)}
.view-switch .dot.i{background:var(--instructor)}
.view-switch button.active .dot{box-shadow:0 0 0 3px rgba(47,122,90,.12)}
.view-switch button.active[data-persona="instructor"] .dot{box-shadow:0 0 0 3px rgba(74,63,168,.12)}

.topbar-right{display:flex;align-items:center;gap:14px;margin-left:auto}
.icon-btn{
  width:34px;height:34px;border-radius:9px;
  display:grid;place-items:center;color:var(--ink-3);
  transition:background .15s var(--ease-out), color .15s var(--ease-out), transform .1s var(--ease-out);
  position:relative;
}
.icon-btn:hover{background:var(--surface-2);color:var(--ink)}
.icon-btn:active{transform:scale(.96)}
.icon-btn.active{background:var(--xai-soft);color:var(--xai);box-shadow:inset 0 0 0 1px rgba(109,77,189,.16)}
.icon-btn .badge-dot{
  position:absolute;top:6px;right:6px;
  width:8px;height:8px;border-radius:50%;background:var(--claude);
  border:2px solid #fff;
  box-shadow:0 0 0 2px rgba(193,95,60,.18);
}
.topbar [data-tip]:hover::after{
  top:calc(100% + 8px);bottom:auto;left:50%;transform:translateX(-50%);
}
.topbar [data-tip]:hover::before{
  top:100%;bottom:auto;left:50%;transform:translateX(-50%);
  border:5px solid transparent;border-bottom-color:var(--ink);border-top-color:transparent;
}
.avatar{
  width:34px;height:34px;border-radius:50%;
  background:linear-gradient(135deg,var(--surface),var(--surface-2));
  border:1px solid var(--line-2);
  display:grid;place-items:center;
  font-family:var(--font-serif);font-weight:700;font-size:13px;letter-spacing:-.02em;
  color:var(--ink-2);
  cursor:pointer;
  transition:.15s var(--ease-out);
}
.avatar:hover{border-color:var(--ink-4);transform:scale(1.04)}

/* ── LEFT NAV ── */
.nav{
  grid-area:nav;
  background:var(--surface);
  border-right:1px solid var(--line);
  padding:20px 14px;
  min-width:0;
  overflow-y:auto;
  display:flex;flex-direction:column;
  transition:padding .24s var(--ease-out);
}
.snb-head{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:0 0 14px;padding:0 4px}
.snb-title{font-size:10px;font-weight:800;color:var(--ink-4);letter-spacing:.1em;text-transform:uppercase}
.snb-toggle{
  width:30px;height:30px;border-radius:9px;display:grid;place-items:center;
  border:1px solid var(--line);background:var(--surface-2);color:var(--ink-3);
  transition:background .15s var(--ease-out),color .15s var(--ease-out),transform .1s var(--ease-out);
}
.snb-toggle:hover{background:#fff;color:var(--ink)}
.snb-toggle:active{transform:scale(.96)}
.nav-group{margin-bottom:22px}
.nav-group-label{
  font-size:10px;font-weight:700;color:var(--ink-4);
  letter-spacing:.1em;text-transform:uppercase;
  padding:0 12px;margin-bottom:8px;
}
.nav-item{
  display:flex;align-items:center;gap:11px;
  padding:8px 12px;border-radius:8px;
  color:var(--ink-2);font-size:13px;font-weight:500;
  cursor:pointer;
  transition:background .12s var(--ease-out), color .12s var(--ease-out);
  position:relative;
  letter-spacing:-.005em;
}
.nav-label{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-item .ico{width:16px;height:16px;color:var(--ink-3);display:grid;place-items:center;flex-shrink:0}
.nav-item .ico svg{width:16px;height:16px}
.icon{display:inline-block;vertical-align:-3px}
.nav-item:hover{background:var(--surface-2);color:var(--ink)}
.nav-item.active{background:var(--surface-2);color:var(--ink);font-weight:600}
.nav-item.active::before{
  content:"";position:absolute;left:-14px;top:10px;bottom:10px;width:3px;
  border-radius:0 3px 3px 0;
}
.s-mode .nav-item.active::before{ background:var(--student) }
.i-mode .nav-item.active::before{ background:var(--instructor) }
.s-mode .nav-item.active .ico{color:var(--student)}
.i-mode .nav-item.active .ico{color:var(--instructor)}
.nav-item:hover .ico{color:var(--ink-2)}
.nav-count{margin-left:auto;font-size:10.5px;color:var(--ink-3);background:var(--surface-2);padding:2px 7px;border-radius:999px;font-weight:600;font-variant-numeric:tabular-nums;min-width:20px;text-align:center}
.nav-item.active .nav-count{background:#fff;border:1px solid var(--line);color:var(--ink-2)}
.s-mode .nav-item.active .nav-count{color:var(--student-ink);border-color:var(--student-soft);background:var(--student-soft)}
.i-mode .nav-item.active .nav-count{color:var(--instructor-ink);border-color:var(--instructor-soft);background:var(--instructor-soft)}

.path-card{
  margin:4px 4px 0;
  padding:14px 14px 12px;
  background:linear-gradient(180deg,var(--surface-2) 0%, rgba(244,242,236,.55) 100%);
  border:1px solid var(--line);
  border-radius:12px;
}
.path-card-title{font-size:10.5px;font-weight:700;color:var(--ink-3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.path-card-title::after{content:"";flex:1;height:1px;background:var(--line-2)}
.path-steps{display:flex;flex-direction:column;gap:2px;position:relative}
.path-steps::before{content:"";position:absolute;left:6px;top:10px;bottom:10px;width:1.5px;background:var(--line-2);border-radius:2px;z-index:0}
.path-step{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--ink-3);padding:4px 0;position:relative;z-index:1}
.path-step .chip-dot{width:14px;height:14px;border-radius:50%;background:#fff;border:1.5px solid var(--line-2);flex-shrink:0;display:grid;place-items:center;transition:.15s}
.path-step.done{color:var(--ink-3);font-weight:500}
.path-step.done .chip-dot{background:var(--student);border-color:var(--student);color:#fff}
.path-step.done .chip-dot::after{content:"";width:6px;height:3px;border-left:1.5px solid currentColor;border-bottom:1.5px solid currentColor;transform:rotate(-45deg) translate(0,-1px)}
.path-step.now{color:var(--ink);font-weight:600}
.path-step.now .chip-dot{background:#fff;border-color:var(--student);box-shadow:0 0 0 3px var(--student-soft)}
.path-step.now .chip-dot::after{content:"";width:6px;height:6px;border-radius:50%;background:var(--student)}
.i-mode .path-step.done .chip-dot{background:var(--instructor);border-color:var(--instructor)}
.i-mode .path-step.now .chip-dot{border-color:var(--instructor);box-shadow:0 0 0 3px var(--instructor-soft)}
.i-mode .path-step.now .chip-dot::after{background:var(--instructor)}

.progress-mini{height:5px;background:#fff;border-radius:4px;overflow:hidden;margin-top:12px;box-shadow:inset 0 0 0 1px var(--line)}
.progress-mini-fill{height:100%;background:linear-gradient(90deg,var(--student),#3f9a75);border-radius:4px;transition:width .8s var(--ease-out)}
.i-mode .progress-mini-fill{background:linear-gradient(90deg,var(--instructor),#6c5edb)}

.nav-footer{
  margin-top:auto;padding:14px 12px 6px;
  display:flex;align-items:center;gap:10px;
  font-size:11.5px;color:var(--ink-3);
  border-top:1px solid var(--line);
  font-weight:500;
}
.nav-footer .sem-dot{width:7px;height:7px;border-radius:50%;background:var(--claude);box-shadow:0 0 0 3px var(--claude-soft);flex-shrink:0}

.app.nav-collapsed .nav,
.app.ai-focus .nav{padding:18px 10px;overflow:visible;align-items:center}
.app.nav-collapsed .snb-head,
.app.ai-focus .snb-head{width:100%;justify-content:center;padding:0;margin-bottom:16px}
.app.nav-collapsed .snb-title,
.app.ai-focus .snb-title{display:none}
.app.nav-collapsed .nav-group,
.app.ai-focus .nav-group{width:100%;margin-bottom:18px;display:flex;flex-direction:column;align-items:center;gap:4px}
.app.nav-collapsed .nav-group-label,
.app.nav-collapsed .path-card,
.app.nav-collapsed .nav-footer,
.app.ai-focus .nav-group-label,
.app.ai-focus .path-card,
.app.ai-focus .nav-footer{display:none}
.app.nav-collapsed .nav-item,
.app.ai-focus .nav-item{
  width:42px;height:42px;padding:0;justify-content:center;gap:0;border-radius:12px;
}
.app.nav-collapsed .nav-item.active::before,
.app.ai-focus .nav-item.active::before{left:-10px;top:9px;bottom:9px}
.app.nav-collapsed .nav-label,
.app.nav-collapsed .nav-count,
.app.ai-focus .nav-label,
.app.ai-focus .nav-count{display:none}
.app.nav-collapsed .nav-item[data-count]:not([data-count=""])::after,
.app.ai-focus .nav-item[data-count]:not([data-count=""])::after{
  content:"";position:absolute;right:7px;top:7px;width:7px;height:7px;border-radius:50%;
  background:var(--claude);box-shadow:0 0 0 2px #fff;
}
.app.nav-collapsed .nav-item[data-tip]:hover::after,
.app.ai-focus .nav-item[data-tip]:hover::after{left:calc(100% + 8px);top:50%;bottom:auto;transform:translateY(-50%);white-space:nowrap}
.app.nav-collapsed .nav-item[data-tip]:hover::before,
.app.ai-focus .nav-item[data-tip]:hover::before{
  left:100%;top:50%;bottom:auto;transform:translateY(-50%);
  border:5px solid transparent;border-right-color:var(--ink);border-top-color:transparent;
}

/* ── MAIN ── */
.main{
  grid-area:main;
  min-width:0;
  overflow-y:auto;
  background:var(--bg);
}
.main-inner{max-width:920px;margin:0 auto;padding:32px 36px 96px}

.page-head{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;gap:20px}
.page-eyebrow{font-size:10.5px;font-weight:700;color:var(--ink-4);letter-spacing:.1em;text-transform:uppercase;margin-bottom:8px}
.page-title{font-family:var(--font-serif);font-weight:700;font-size:28px;letter-spacing:-.028em;line-height:1.2;color:var(--ink)}
.page-title em{font-style:normal;color:var(--claude);font-weight:700}
.page-sub{font-size:13.5px;color:var(--ink-3);margin-top:10px;max-width:660px;line-height:1.65;letter-spacing:-.003em}

.page-head-actions{display:flex;gap:8px;flex-shrink:0}

.btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 14px;border-radius:8px;
  font-size:12.5px;font-weight:600;color:var(--ink-2);
  background:var(--surface);
  border:1px solid var(--line-2);
  box-shadow:0 1px 0 rgba(20,18,14,.02);
  transition:background .15s var(--ease-out), border-color .15s var(--ease-out), box-shadow .15s var(--ease-out), transform .1s var(--ease-out);
  cursor:pointer;letter-spacing:-.005em;
  user-select:none;
}
.btn svg{flex-shrink:0}
.btn:hover{background:var(--surface-3);border-color:var(--ink-4);box-shadow:0 1px 0 rgba(20,18,14,.05),0 2px 6px -2px rgba(20,18,14,.10)}
.btn:active{transform:translateY(.5px);box-shadow:none}
.btn:focus-visible{outline:2px solid var(--claude);outline-offset:2px}
.btn-primary{background:var(--ink);color:#fff;border-color:var(--ink);box-shadow:0 1px 0 rgba(0,0,0,.15),inset 0 1px 0 rgba(255,255,255,.08)}
.btn-primary:hover{background:#000;border-color:#000;box-shadow:0 1px 0 rgba(0,0,0,.2),0 4px 12px -2px rgba(0,0,0,.2)}
.btn-claude{background:linear-gradient(180deg,#d07049 0%,#b9572f 100%);color:#fff;border-color:#a84d26;box-shadow:0 1px 0 rgba(120,50,20,.2),inset 0 1px 0 rgba(255,255,255,.14)}
.btn-claude:hover{background:linear-gradient(180deg,#c86543 0%,#ab4d2a 100%);box-shadow:0 1px 0 rgba(120,50,20,.3),0 6px 16px -3px rgba(193,95,60,.45)}
.btn-student{background:linear-gradient(180deg,#348562 0%,#266949 100%);color:#fff;border-color:#1f5c40;box-shadow:0 1px 0 rgba(20,70,50,.2),inset 0 1px 0 rgba(255,255,255,.14)}
.btn-student:hover{background:linear-gradient(180deg,#2d7554 0%,#1f5e3e 100%);box-shadow:0 1px 0 rgba(20,70,50,.3),0 6px 16px -3px rgba(47,122,90,.45)}
.btn-instructor{background:linear-gradient(180deg,#5246b8 0%,#3e33a0 100%);color:#fff;border-color:#362b92;box-shadow:0 1px 0 rgba(40,30,120,.2),inset 0 1px 0 rgba(255,255,255,.14)}
.btn-instructor:hover{background:linear-gradient(180deg,#4940aa 0%,#372d93 100%);box-shadow:0 1px 0 rgba(40,30,120,.3),0 6px 16px -3px rgba(74,63,168,.5)}
.btn-ghost{background:transparent;border-color:transparent;color:var(--ink-3);box-shadow:none}
.btn-ghost:hover{background:var(--surface-2);color:var(--ink);box-shadow:none}
.btn-sm{padding:5px 13px;font-size:12px;border-radius:7px;gap:5px;letter-spacing:-.008em}
.btn-sm svg{width:12px;height:12px}

/* ── CARD ── */
.card{
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:var(--radius-lg);
  padding:18px 20px;
  box-shadow:var(--shadow-1);
  transition:box-shadow .2s var(--ease-out), border-color .2s var(--ease-out), transform .2s var(--ease-out);
}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:10px}
.card-title{font-family:var(--font-serif);font-weight:600;font-size:15px;letter-spacing:-.018em;color:var(--ink)}
.card-sub{font-size:12px;color:var(--ink-3);margin-top:2px}

/* ── GRID ── */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.stack{display:flex;flex-direction:column;gap:14px}

/* ── BADGES & CHIPS ── */
.tag{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:999px;
  font-size:10.5px;font-weight:600;letter-spacing:-.003em;
  background:var(--surface-2);color:var(--ink-3);
  border:1px solid transparent;
  white-space:nowrap;
}
.tag-claude{background:var(--claude-soft);color:var(--claude-ink)}
.tag-student{background:var(--student-soft);color:var(--student-ink)}
.tag-instructor{background:var(--instructor-soft);color:var(--instructor-ink)}
.tag-xai{background:var(--xai-soft);color:var(--xai)}
.tag-danger{background:var(--danger-soft);color:var(--danger)}
.tag-warn{background:var(--warn-soft);color:var(--warn)}
.tag-ok{background:var(--ok-soft);color:var(--ok)}
.tag-line{background:transparent;border:1px solid var(--line-2);color:var(--ink-3)}

.ai-badge{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px 3px 9px;border-radius:999px;
  font-size:10.5px;font-weight:700;letter-spacing:-.003em;
  background:linear-gradient(180deg,#f1ebfb,#e7deF6);
  color:var(--xai);
  border:1px solid rgba(109,77,189,.14);
  cursor:pointer;
  transition:all .15s var(--ease-out);
  box-shadow:0 1px 0 rgba(109,77,189,.04);
}
.ai-badge:hover{background:linear-gradient(180deg,#e7deF6,#dccff2);border-color:rgba(109,77,189,.3)}
.ai-badge .spark{font-size:11px}
.ai-spark{display:inline-block;vertical-align:-1px;margin-right:4px;color:var(--xai);filter:drop-shadow(0 1px 0 rgba(109,77,189,.15))}
.ai-touchpoint{
  position:relative;
  border-color:rgba(109,77,189,.24)!important;
  box-shadow:0 1px 0 rgba(109,77,189,.04),0 0 0 1px rgba(109,77,189,.04);
}
.ai-touchpoint::after{
  content:"AI";
  position:absolute;top:10px;right:10px;
  padding:2px 6px;border-radius:999px;
  background:var(--xai-soft);color:var(--xai);
  font-size:9.5px;font-weight:800;letter-spacing:.08em;
}
.ai-action-strip{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  margin-top:12px;padding-top:12px;border-top:1px dashed rgba(109,77,189,.22);
}
.ai-action-note{font-size:11.5px;color:var(--ink-3);font-weight:600;display:flex;align-items:center;gap:6px}
.ai-action-note::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--xai)}
.ai-action-strip .btn{margin-left:auto}
.ai-meta-line{
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;
  margin-top:9px;font-size:11.5px;color:var(--ink-3);line-height:1.45;
}
.ai-intent,.ai-role{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 7px;border-radius:999px;font-size:10px;font-weight:800;
  letter-spacing:.03em;text-transform:uppercase;border:1px solid rgba(109,77,189,.14);
}
.ai-intent{background:#fff;color:var(--xai)}
.ai-role{background:var(--xai-soft);color:var(--xai)}
.ai-evidence-strip{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  margin-top:10px;padding:8px 10px;border-radius:8px;
  background:rgba(109,77,189,.055);border:1px solid rgba(109,77,189,.12);
  font-size:11.5px;color:var(--ink-2);line-height:1.45;
}
.ai-evidence-strip strong{color:var(--ink)}
.ai-evidence-strip .confidence-dot{
  width:7px;height:7px;border-radius:50%;background:var(--xai);
  box-shadow:0 0 0 3px rgba(109,77,189,.11);flex:0 0 auto;
}
.ai-action-stack{
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;
  margin-top:10px;padding-top:10px;border-top:1px dashed rgba(109,77,189,.2);
}
.ai-action-stack .ai-action-label{
  font-size:11px;font-weight:800;color:var(--xai);letter-spacing:.04em;text-transform:uppercase;
  margin-right:auto;
}
.ai-action-stack .btn{min-width:auto}

/* ── STATS ── */
.stat{
  padding:16px 18px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
  box-shadow:var(--shadow-1);
  transition:box-shadow .2s var(--ease-out), transform .2s var(--ease-out);
}
.stat:hover{box-shadow:var(--shadow-2);transform:translateY(-1px)}
.stat-label{font-size:11.5px;color:var(--ink-3);margin-bottom:6px;font-weight:500;letter-spacing:-.003em}
.stat-value{font-family:var(--font-serif);font-weight:800;font-size:26px;letter-spacing:-.035em;line-height:1.1;color:var(--ink);font-variant-numeric:tabular-nums;display:flex;align-items:baseline;gap:2px}
.stat-value > span{font-family:var(--font-sans);font-weight:600;font-size:13px;color:var(--ink-3);letter-spacing:-.005em}
.stat-sub{font-size:11.5px;color:var(--ink-3);margin-top:6px;display:flex;align-items:center;gap:4px;font-weight:500}
.stat-sub.up{color:var(--ok)}
.stat-sub.down{color:var(--danger)}

/* ── xAI "WHY" PANEL ── */
.xai-panel{
  position:relative;
  background:
    radial-gradient(180px 80px at 100% 0%, rgba(109,77,189,.08), transparent 70%),
    linear-gradient(180deg, #f7f2fc 0%, #fbf9fd 100%);
  border:1px solid #dfd3f1;
  border-radius:12px;
  padding:16px 18px;
  box-shadow:0 1px 0 rgba(109,77,189,.04);
}
.xai-panel-head{
  display:flex;align-items:center;gap:8px;
  font-size:10.5px;font-weight:700;color:var(--xai);
  text-transform:uppercase;letter-spacing:.08em;
  margin-bottom:10px;
}
.xai-panel-head .spark{
  width:20px;height:20px;border-radius:6px;
  background:linear-gradient(140deg,#8468d0,#5c3da8);
  color:#fff;display:grid;place-items:center;
  box-shadow:0 1px 0 rgba(109,77,189,.3), inset 0 1px 0 rgba(255,255,255,.2);
  flex-shrink:0;
}
.xai-panel-head .spark svg{display:block}
.xai-panel-body{font-size:12.5px;color:var(--ink-2);line-height:1.7;letter-spacing:-.003em}
.xai-panel-body strong{font-weight:700;color:var(--ink)}

/* xAI 5요소 footer — 모델 버전 · 효과 측정 예약 · Mei-waku 이의제기 */
.xai-meta{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  margin-top:12px;padding-top:12px;
  border-top:1px dashed rgba(109,77,189,.25);
  font-size:10.5px;color:var(--ink-3);font-weight:500;letter-spacing:-.003em;
}
.xai-meta .tag-mini{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 9px;border-radius:999px;
  background:#fff;border:1px solid rgba(109,77,189,.22);color:var(--xai);
  font-size:10.5px;font-weight:700;white-space:nowrap;
}
.xai-meta .tag-mini svg{width:10px;height:10px}
.xai-meta .tag-mini.measure{border-color:rgba(47,122,90,.22);color:var(--ok)}
.xai-meta .meiwaku{
  margin-left:auto;display:inline-flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:999px;
  background:#fff;border:1px solid rgba(180,69,44,.22);color:var(--danger);
  cursor:pointer;transition:background .15s var(--ease-out),border-color .15s var(--ease-out);
  font-weight:700;font-size:10.5px;
}
.xai-meta .meiwaku:hover{background:var(--danger-soft);border-color:var(--danger)}
.xai-meta .meiwaku svg{width:10px;height:10px}

/* 얇은 Mei-waku (xai-panel 외부 카드에서 사용) */
.meiwaku-thin{
  display:flex;align-items:center;gap:8px;
  font-size:11px;color:var(--ink-4);font-weight:500;
  padding:10px 0 2px;
  border-top:1px dashed var(--line);
  margin-top:12px;
  letter-spacing:-.003em;
}
.meiwaku-thin .meiwaku-link{color:var(--danger);font-weight:700;cursor:pointer;margin-left:auto;display:inline-flex;align-items:center;gap:4px;text-decoration:none}
.meiwaku-thin .meiwaku-link:hover{text-decoration:underline}
.jp{opacity:.72;font-weight:500;letter-spacing:-.005em}

/* ── PACE BLOCK (오늘의 AI 학습 계획 1블록) ── */
.pace-block{
  display:grid;grid-template-columns:104px 1fr;gap:18px;
  padding:18px 20px;background:var(--surface);
  border:1px solid var(--line);border-radius:14px;
  box-shadow:var(--shadow-1);
  transition:border-color .15s var(--ease-out),box-shadow .15s var(--ease-out);
  position:relative;overflow:hidden;
}
.pace-block:hover{border-color:var(--ink-4);box-shadow:var(--shadow-2)}
.pace-time{position:relative}
.pace-time::after{content:"";position:absolute;top:4px;right:-9px;bottom:4px;width:1.5px;background:var(--line)}
.pace-time-val{
  font-family:var(--font-serif);font-size:13px;font-weight:700;
  color:var(--ink);letter-spacing:-.02em;font-variant-numeric:tabular-nums;
  line-height:1.35;
}
.pace-body{min-width:0}
.pace-title{font-size:14.5px;font-weight:700;color:var(--ink);letter-spacing:-.012em;line-height:1.35}
.pace-title .jp{font-weight:500;color:var(--ink-3);font-size:13px}
.pace-sub{font-size:12px;color:var(--ink-3);margin-top:4px;line-height:1.55}
.pace-reason{margin-top:12px;padding:10px 12px;background:var(--surface-2);border-radius:9px;border:1px solid var(--line)}
.pace-reason-label{font-size:10px;font-weight:700;color:var(--ink-4);letter-spacing:.08em;text-transform:uppercase;margin-bottom:4px}
.pace-reason ul{list-style:none;margin:0;padding:0}
.pace-reason ul li{font-size:12px;color:var(--ink-2);line-height:1.7;padding-left:14px;position:relative;letter-spacing:-.003em}
.pace-reason ul li::before{content:"";position:absolute;left:2px;top:9px;width:5px;height:5px;border-radius:50%;background:var(--xai);opacity:.55}
.pace-effect{
  display:flex;align-items:center;gap:8px;margin-top:10px;padding:8px 12px;
  background:var(--ok-soft);border:1px solid rgba(47,122,90,.16);border-radius:8px;
  font-size:12px;color:var(--ok);letter-spacing:-.003em;
}
.pace-effect-ico{width:20px;height:20px;border-radius:6px;background:var(--ok);color:#fff;display:grid;place-items:center;flex-shrink:0}
.pace-effect-text strong{color:var(--student-ink);font-weight:700}
.pace-actions{display:flex;align-items:center;gap:6px;margin-top:14px;flex-wrap:wrap}
.meiwaku-inline{
  display:inline-flex;align-items:center;gap:5px;
  margin-left:auto;padding:4px 10px;border-radius:999px;
  font-size:10.5px;font-weight:600;color:var(--danger);
  cursor:pointer;transition:.15s var(--ease-out);
  border:1px solid transparent;
}
.meiwaku-inline:hover{background:var(--danger-soft);border-color:rgba(180,69,44,.2)}

/* ── CO-CREATION STUDIO · variant ── */
.co-variant{
  padding:16px 18px;background:var(--surface);
  border:1px solid var(--line);border-radius:12px;
  box-shadow:var(--shadow-1);
  transition:border-color .15s var(--ease-out), box-shadow .15s var(--ease-out);
}
.co-variant:hover{border-color:var(--ink-4);box-shadow:var(--shadow-2)}
.co-variant.selected{border-color:var(--instructor);background:linear-gradient(180deg,#fdfbff,#fff);box-shadow:0 1px 0 rgba(74,63,168,.08),0 4px 14px -3px rgba(74,63,168,.12)}
.co-variant.selected::before{content:"";position:absolute;left:-14px;top:14px;bottom:14px;width:3px;background:var(--instructor);border-radius:0 3px 3px 0}
.co-variant-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px}
.co-variant-body{font-size:12.5px;color:var(--ink-2);line-height:1.6;letter-spacing:-.003em}
.co-variant-meta{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:12px;padding-top:12px;border-top:1px dashed var(--line)}
.co-variant-meta > div{display:flex;flex-direction:column;gap:2px}
.co-meta-k{font-size:10.5px;color:var(--ink-4);font-weight:600;letter-spacing:.03em}
.co-meta-v{font-family:var(--font-serif);font-size:15px;font-weight:700;color:var(--ink);letter-spacing:-.025em;font-variant-numeric:tabular-nums}

/* ── CLASS SUPPORT · 낙인 방지 반 단위 개입 카드 ── */
.class-support{
  display:grid;grid-template-columns:32px 42px 1fr auto;gap:14px;align-items:center;
  padding:14px 16px;background:#fff;
  border:1px solid var(--line);border-radius:10px;
  transition:border-color .15s var(--ease-out),box-shadow .15s var(--ease-out);
}
.class-support:hover{border-color:var(--instructor);box-shadow:var(--shadow-2)}
.cs-num{
  font-family:var(--font-serif);font-size:20px;font-weight:800;
  color:var(--ink-4);letter-spacing:-.03em;font-variant-numeric:tabular-nums;
  text-align:center;
}
.cs-ico{width:42px;height:42px}
.cs-body{min-width:0}
.cs-title{font-size:14px;font-weight:700;color:var(--ink);letter-spacing:-.012em;line-height:1.35}
.cs-title .jp{font-weight:500;color:var(--ink-3);font-size:12.5px}
.cs-pattern{font-size:12px;color:var(--ink-3);margin-top:4px;line-height:1.5}
.cs-pat-label{font-size:10.5px;font-weight:700;color:var(--ink-4);letter-spacing:.06em;text-transform:uppercase;margin-right:6px}
.cs-count{display:inline-block;margin-left:6px;padding:1px 8px;border-radius:999px;background:var(--instructor-soft);color:var(--instructor-ink);font-weight:700;font-size:11px}
.cs-metrics{display:flex;gap:14px;margin-top:8px;flex-wrap:wrap}
.cs-metric{display:flex;flex-direction:column;gap:1px}
.cs-m-k{font-size:10px;font-weight:700;color:var(--ink-4);letter-spacing:.03em;text-transform:uppercase}
.cs-m-v{font-size:12px;font-weight:700;color:var(--ink);font-variant-numeric:tabular-nums}
.cs-m-v.ok{color:var(--ok)}
.cs-action{white-space:nowrap}

.confidence{
  display:flex;align-items:center;gap:10px;margin-top:12px;
  font-size:11px;color:var(--ink-3);font-weight:600;letter-spacing:-.003em;
}
.confidence-bar{flex:1;height:6px;background:#fff;border-radius:999px;overflow:hidden;border:1px solid #dfd3f1;box-shadow:inset 0 1px 0 rgba(109,77,189,.03)}
.confidence-bar-fill{height:100%;background:linear-gradient(90deg,#8468d0,#5c3da8);border-radius:999px;transition:width .8s var(--ease-out)}
.confidence-value{font-variant-numeric:tabular-nums;font-weight:700;color:var(--xai);font-size:12px}

.source-list{display:flex;flex-direction:column;gap:5px;margin-top:12px}
.source-item{
  display:flex;align-items:center;gap:9px;
  padding:7px 11px;background:#fff;border:1px solid #e5daf5;border-radius:8px;
  font-size:11.5px;color:var(--ink-2);font-weight:500;
  transition:border-color .15s var(--ease-out);
}
.source-item:hover{border-color:#c8b3ec}
.source-item .dot{width:6px;height:6px;border-radius:50%;background:var(--xai);flex-shrink:0}
.source-weight{margin-left:auto;font-variant-numeric:tabular-nums;color:var(--xai);font-weight:700;font-size:11px;padding:1px 7px;background:var(--xai-soft);border-radius:999px}

/* ── ASIDE (context/explainability panel) ── */
.aside{
  grid-area:aside;
  background:var(--surface);
  border-left:1px solid var(--line);
  padding:22px 20px 28px;
  min-width:0;
  overflow-y:auto;
  display:flex;flex-direction:column;gap:18px;
  transition:padding .24s var(--ease-out);
}
.ai-panel-toolbar{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  margin:-4px 0 2px;padding:8px 10px;border:1px solid var(--line);
  border-radius:12px;background:var(--surface-2);
}
.ai-panel-label{display:flex;align-items:center;gap:7px;font-size:11px;font-weight:800;color:var(--xai);letter-spacing:.08em;text-transform:uppercase}
.ai-panel-label::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--xai);box-shadow:0 0 0 3px var(--xai-soft)}
.ai-panel-expand{
  width:30px;height:30px;border-radius:9px;display:grid;place-items:center;
  border:1px solid rgba(109,77,189,.18);background:#fff;color:var(--xai);
}
.ai-panel-expand:hover{background:var(--xai-soft)}
.aside-head{display:flex;align-items:flex-start;gap:10px;justify-content:space-between}
.aside-head > div:first-child{flex:1;min-width:0}
.aside-title{font-family:var(--font-serif);font-size:16px;font-weight:700;letter-spacing:-.025em;color:var(--ink);line-height:1.2}
.aside-sub{font-size:11.5px;color:var(--ink-4);margin-top:3px;font-weight:500}

.aside-tabs{display:flex;gap:2px;background:var(--surface-2);padding:3px;border-radius:8px}
.aside-tab{flex:1;padding:6px 8px;font-size:11.5px;font-weight:500;color:var(--ink-3);border-radius:6px;text-align:center;cursor:pointer;transition:.15s}
.aside-tab.active{background:var(--surface);color:var(--ink);box-shadow:var(--shadow-1);font-weight:600}

.app.ai-expanded .aside,
.app.ai-focus .aside{padding:20px 22px 28px;gap:16px}
.focus-dock{
  display:none;
  border:1px solid rgba(109,77,189,.24);
  border-radius:16px;
  padding:16px;
  background:
    radial-gradient(220px 120px at 100% 0%, rgba(109,77,189,.12), transparent 70%),
    linear-gradient(180deg,#fbf8ff 0%,#fff 100%);
  box-shadow:0 1px 0 rgba(109,77,189,.04),0 10px 28px -18px rgba(109,77,189,.45);
}
.app.ai-expanded .focus-dock,
.app.ai-focus .focus-dock{display:block}
.focus-dock-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px}
.focus-dock-eyebrow{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--xai);margin-bottom:5px}
.focus-dock-title{font-family:var(--font-serif);font-size:17px;font-weight:800;letter-spacing:-.025em;line-height:1.2}
.focus-exit{
  width:30px;height:30px;border-radius:9px;display:grid;place-items:center;
  color:var(--ink-3);background:#fff;border:1px solid rgba(109,77,189,.18);
}
.focus-exit:hover{color:var(--xai);background:var(--xai-soft)}
.focus-primary{
  padding:12px 14px;border-radius:12px;background:#fff;border:1px solid rgba(109,77,189,.18);
  display:flex;flex-direction:column;gap:10px;box-shadow:var(--shadow-1);
}
.focus-row{display:grid;grid-template-columns:92px 1fr;gap:12px;font-size:12.5px;line-height:1.55}
.focus-key{font-size:10.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-4)}
.focus-val{color:var(--ink-2);font-weight:500}
.focus-val strong{color:var(--ink);font-weight:800}
.focus-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.focus-detail{border-top:1px dashed rgba(109,77,189,.22);margin-top:13px;padding-top:8px}
.focus-detail details{border-bottom:1px solid rgba(109,77,189,.12)}
.focus-detail details:last-child{border-bottom:0}
.focus-detail summary{
  list-style:none;display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:9px 0;font-size:12px;font-weight:800;color:var(--ink-2);cursor:pointer;
}
.focus-detail summary::-webkit-details-marker{display:none}
.focus-detail summary::after{content:"+";color:var(--xai);font-weight:800}
.focus-detail details[open] summary::after{content:"-"}
.focus-detail-body{font-size:12px;color:var(--ink-3);line-height:1.65;padding:0 0 10px}
.focus-detail-body ul{list-style:none;display:flex;flex-direction:column;gap:6px}
.focus-detail-body li{display:flex;gap:7px}
.focus-detail-body li::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--xai);margin-top:7px;flex-shrink:0}
.override-box{
  margin-top:12px;padding:11px 12px;border-radius:12px;background:var(--surface-2);
  border:1px solid var(--line);font-size:11.5px;color:var(--ink-3);line-height:1.55;
}
.override-box select{
  width:100%;margin-top:8px;border:1px solid var(--line-2);border-radius:8px;background:#fff;
  padding:7px 9px;font-size:12px;color:var(--ink-2);
}
.focus-breadcrumb{
  display:none;margin:-4px 0 16px;padding:9px 12px;border-radius:10px;
  background:rgba(255,255,255,.72);border:1px solid var(--line);
  color:var(--ink-3);font-size:11.5px;font-weight:600;
}
.app.ai-expanded .focus-breadcrumb,
.app.ai-focus .focus-breadcrumb{display:flex;align-items:center;gap:8px}

/* ── COMPANION (AI chat) ── */
.companion{
  display:flex;flex-direction:column;gap:12px;
  background:linear-gradient(180deg,var(--surface-2) 0%, #fdfbf5 100%);
  border-radius:14px;padding:14px;
  border:1px solid var(--line);
  box-shadow:var(--shadow-1);
}
.msg{display:flex;gap:9px;align-items:flex-start}
.msg-avatar{
  width:28px;height:28px;border-radius:8px;flex-shrink:0;
  display:grid;place-items:center;font-size:12px;font-weight:800;color:#fff;
  font-family:var(--font-serif);letter-spacing:-.02em;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.2), 0 1px 0 rgba(0,0,0,.06);
}
.msg-avatar.ai{background:linear-gradient(140deg,#e8b997 0%,#d57a4f 50%,#b65032 100%)}
.msg-avatar.user{background:linear-gradient(135deg,#4a4744,#1f1e1c)}
.msg-avatar.prof{background:linear-gradient(140deg,#6c5edb,#3e33a0)}
.msg-content{flex:1;font-size:12.5px;line-height:1.6;color:var(--ink-2);min-width:0}
.msg-content .who{font-weight:700;color:var(--ink);margin-right:6px;letter-spacing:-.005em}
.msg-content .time{font-size:10.5px;color:var(--ink-4);margin-left:4px;font-weight:500;font-variant-numeric:tabular-nums}
.msg-content p{margin-top:3px}
.msg-content .cite{margin-top:8px;margin-right:4px;display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;background:#fff;border:1px solid var(--line);font-size:10.5px;color:var(--ink-3);font-weight:500}
.companion-input{
  display:flex;align-items:center;gap:8px;
  background:#fff;border:1px solid var(--line);border-radius:10px;padding:8px 8px 8px 12px;
  transition:border-color .15s var(--ease-out), box-shadow .15s var(--ease-out);
}
.companion-input:focus-within{border-color:var(--claude);box-shadow:0 0 0 4px rgba(193,95,60,.08)}
.companion-input input{flex:1;border:0;outline:0;font-size:12.5px;background:transparent;color:var(--ink);letter-spacing:-.005em}
.companion-input input::placeholder{color:var(--ink-4)}
.companion-input .send{
  width:30px;height:30px;border-radius:8px;
  background:linear-gradient(180deg,#d07049,#b9572f);
  color:#fff;display:grid;place-items:center;
  box-shadow:0 1px 0 rgba(120,50,20,.2), inset 0 1px 0 rgba(255,255,255,.14);
  transition:transform .1s var(--ease-out), box-shadow .15s var(--ease-out);
}
.companion-input .send:hover{box-shadow:0 1px 0 rgba(120,50,20,.3),0 4px 12px -2px rgba(193,95,60,.45)}
.companion-input .send:active{transform:scale(.95)}
.companion-presets{display:flex;gap:5px;flex-wrap:wrap}
.companion-preset{font-size:11px;padding:5px 10px;border-radius:999px;background:#fff;border:1px solid var(--line);color:var(--ink-3);cursor:pointer;transition:border-color .12s var(--ease-out), color .12s var(--ease-out), background .12s var(--ease-out);font-weight:500}
.companion-preset:hover{border-color:var(--claude);color:var(--claude);background:var(--claude-soft)}

/* ── DASHBOARD CARDS ── */
.dash-hero{
  position:relative;
  background:
    radial-gradient(900px 320px at 0% 0%, rgba(193,95,60,.08), transparent 55%),
    radial-gradient(600px 220px at 100% 0%, rgba(109,77,189,.05), transparent 55%),
    linear-gradient(180deg,#fff 0%, #fdfbf5 100%);
  border:1px solid var(--line);
  border-radius:16px;
  padding:26px 28px 24px;
  margin-bottom:18px;
  box-shadow:var(--shadow-1);
  overflow:hidden;
}
.dash-hero::before{content:"";position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(193,95,60,.2) 20%,rgba(193,95,60,.2) 80%,transparent)}
.dash-hero h2{font-family:var(--font-serif);font-weight:700;font-size:22px;letter-spacing:-.025em;line-height:1.35}
.dash-hero h2 em{font-style:normal;color:var(--claude);font-weight:700}
.dash-hero .hero-sub{font-size:13px;color:var(--ink-3);margin-top:8px;max-width:620px;line-height:1.65;letter-spacing:-.003em}
.hero-pills{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.hero-pill{
  display:inline-flex;align-items:center;gap:7px;
  padding:6px 12px 6px 6px;border-radius:999px;
  background:#fff;border:1px solid var(--line-2);
  font-size:12px;color:var(--ink-2);font-weight:500;
  box-shadow:var(--shadow-1);
  letter-spacing:-.005em;
}
.hero-pill .pill-ico{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:block;margin-top:1px;overflow:hidden;font-size:0}
.hero-pill.focus .pill-ico{background:var(--claude)}
.hero-pill.risk .pill-ico{background:var(--danger)}
.hero-pill.ok .pill-ico{background:var(--ok)}

/* ── COURSE CARD ── */
.course-card{
  display:grid;grid-template-columns:52px 1fr auto;gap:14px;align-items:center;
  padding:14px 16px;background:var(--surface);border:1px solid var(--line);border-radius:12px;
  transition:border-color .2s var(--ease-out), box-shadow .2s var(--ease-out), transform .2s var(--ease-out);
  cursor:pointer;
  box-shadow:var(--shadow-1);
}
.course-card:hover{border-color:var(--claude);box-shadow:var(--shadow-2);transform:translateY(-1px)}
.course-thumb{
  border-radius:12px;flex-shrink:0;
  display:grid;place-items:center;
  position:relative;overflow:hidden;
  transition:transform .2s var(--ease-out);
}
.course-thumb::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.2),transparent 45%);pointer-events:none;border-radius:12px}
.course-card:hover .course-thumb{transform:scale(1.04)}
.i-mode .course-thumb{background:linear-gradient(140deg,var(--instructor-soft),#d0c9ef);color:var(--instructor-ink);box-shadow:inset 0 0 0 1px rgba(74,63,168,.14), 0 1px 0 rgba(20,18,14,.04)}

/* ── DECISION CARD ── */
.decision-card{
  display:grid;grid-template-columns:44px 1fr auto;gap:16px;align-items:center;
  padding:16px 20px;background:var(--surface);
  border:1px solid var(--line);border-radius:12px;
  position:relative;overflow:hidden;
  box-shadow:var(--shadow-1);
  transition:border-color .15s var(--ease-out), box-shadow .15s var(--ease-out), transform .15s var(--ease-out);
}
.decision-card:hover{border-color:var(--ink-4);box-shadow:var(--shadow-2);transform:translateY(-1px)}
.decision-card::before{
  content:"";position:absolute;left:0;top:14px;bottom:14px;width:3px;border-radius:0 3px 3px 0;
}
.decision-high::before{background:var(--danger)}
.decision-mid::before{background:var(--warn)}
.decision-low::before{background:var(--xai)}
.decision-ico{width:44px;height:44px}
.decision-title{font-size:14px;font-weight:700;color:var(--ink);line-height:1.35;letter-spacing:-.01em}
.decision-sub{font-size:12px;color:var(--ink-3);margin-top:4px;line-height:1.5}
.decision-actions{display:flex;gap:6px;flex-shrink:0}

/* ── ACTION TILE (dashboard row prefix) ── */
.action-tile{
  width:42px;height:42px;border-radius:11px;flex-shrink:0;
  display:grid;place-items:center;
  box-shadow:inset 0 0 0 1px rgba(0,0,0,.05), inset 0 1px 0 rgba(255,255,255,.4), 0 1px 0 rgba(20,18,14,.04);
  position:relative;overflow:hidden;
}
.action-tile::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.18),transparent 45%);pointer-events:none}
.action-tile.student{background:linear-gradient(145deg,#dcf0e4,#bfe1cd);color:#1f5c40}
.action-tile.claude{background:linear-gradient(145deg,#f6e3d6,#efcdb7);color:#7a3620}
.action-tile.xai{background:linear-gradient(145deg,#ece6f9,#d6ccf3);color:#4a3aa0}
.action-tile.instructor{background:linear-gradient(145deg,#e2e0f5,#cfcaec);color:#2d2478}
.action-tile.danger{background:linear-gradient(145deg,#f8e1d8,#f3c9b8);color:#8a2e17}
.action-tile.warn{background:linear-gradient(145deg,#fae8cc,#f3d4a0);color:#5c3a08}
.course-name{font-weight:700;font-size:13.5px;color:var(--ink);line-height:1.3;letter-spacing:-.012em}
.course-code{font-size:11.5px;color:var(--ink-3);margin-top:3px;font-weight:500}
.course-meta{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;align-items:center}
.course-meta-item{font-size:11.5px;color:var(--ink-3);font-weight:500;letter-spacing:-.003em}
.course-meta-item + .course-meta-item::before{content:"·";color:var(--ink-4);margin-right:6px}

.prog-ring{
  --p:72; --size:46px; --bg:var(--surface-2);
  width:var(--size);height:var(--size);border-radius:50%;
  background:
    conic-gradient(var(--student) calc(var(--p)*1%), var(--bg) 0);
  display:grid;place-items:center;
  box-shadow:inset 0 0 0 1px var(--line);
  transition:background .6s var(--ease-out);
}
.i-mode .prog-ring{background: conic-gradient(var(--instructor) calc(var(--p)*1%), var(--bg) 0);}
.prog-ring::after{
  content:"";width:calc(var(--size) - 10px);height:calc(var(--size) - 10px);
  background:var(--surface);border-radius:50%;
  box-shadow:inset 0 0 0 1px var(--line);
}
.prog-ring-label{
  position:absolute;font-size:11.5px;font-weight:700;color:var(--ink);
  font-variant-numeric:tabular-nums;font-family:var(--font-serif);letter-spacing:-.02em;
}
.prog-ring-wrap{position:relative;display:grid;place-items:center;width:46px;height:46px;flex-shrink:0}

/* ── TIMELINE ── */
.timeline{display:flex;flex-direction:column;gap:0;position:relative;padding:4px 4px}
.timeline::before{content:"";position:absolute;left:56px;top:22px;bottom:22px;width:1.5px;background:repeating-linear-gradient(180deg,var(--line-2) 0 4px,transparent 4px 8px);border-radius:2px;pointer-events:none}
.tl-row{display:grid;grid-template-columns:64px 1fr auto;gap:16px;padding:14px 8px;align-items:center;position:relative;border-radius:8px;transition:background .15s var(--ease-out)}
.tl-row:hover{background:var(--surface-2)}
.tl-row + .tl-row{border-top:1px solid var(--line)}
.tl-row::after{content:"";position:absolute;left:54px;top:50%;transform:translate(-50%,-50%);width:9px;height:9px;border-radius:50%;background:#fff;border:2px solid var(--line-2);z-index:1;transition:.15s var(--ease-out)}
.tl-row:first-child::after{border-color:var(--claude);background:var(--claude);box-shadow:0 0 0 3px var(--claude-soft)}
.tl-time{font-size:11.5px;color:var(--ink-3);font-variant-numeric:tabular-nums;font-weight:600;letter-spacing:-.003em}
.tl-title{font-weight:600;font-size:13.5px;color:var(--ink);letter-spacing:-.008em;line-height:1.4}
.tl-sub{font-size:12px;color:var(--ink-3);margin-top:3px;line-height:1.5}
.tl-badge{flex-shrink:0}

/* ── RISK STRIP ── */
.risk-strip{
  display:flex;align-items:center;gap:14px;
  padding:14px 18px;border-radius:12px;
  background:
    radial-gradient(300px 80px at 0% 50%, rgba(180,69,44,.1), transparent 60%),
    linear-gradient(180deg,#fff,#fbf5f1);
  border:1px solid rgba(180,69,44,.2);
  box-shadow:var(--shadow-1);
}
.risk-icon{
  width:38px;height:38px;border-radius:11px;
  background:linear-gradient(145deg,#f8e1d8,#f3c9b8);
  color:var(--danger);
  display:grid;place-items:center;flex-shrink:0;
  box-shadow:inset 0 0 0 1px rgba(180,69,44,.15), inset 0 1px 0 rgba(255,255,255,.3), 0 1px 0 rgba(20,18,14,.04);
}
.risk-text{flex:1;min-width:0}
.risk-text .rt-title{font-size:13.5px;font-weight:700;color:var(--ink);letter-spacing:-.008em;line-height:1.35}
.risk-text .rt-sub{font-size:12px;color:var(--ink-3);margin-top:3px;line-height:1.5}

/* ── VIDEO PAGE ── */
.video-frame{
  background:#14120f;
  border-radius:var(--radius-lg);
  aspect-ratio: 16/9;
  display:grid;place-items:center;
  position:relative;overflow:hidden;
  color:#fff;
}
.video-frame::before{
  content:"";position:absolute;inset:0;
  background:
    radial-gradient(600px 280px at 30% 20%, rgba(193,95,60,.25), transparent),
    radial-gradient(500px 280px at 80% 80%, rgba(109,77,189,.28), transparent);
}
.video-title{position:absolute;top:18px;left:22px;font-size:13px;color:rgba(255,255,255,.7)}
.video-play{
  position:relative;z-index:1;
  width:72px;height:72px;border-radius:50%;
  background:rgba(255,255,255,.12);backdrop-filter:blur(6px);
  display:grid;place-items:center;
  border:1px solid rgba(255,255,255,.2);
  color:#fff;font-size:22px;
}
.video-controls{
  position:absolute;bottom:16px;left:22px;right:22px;z-index:1;
  display:flex;align-items:center;gap:12px;color:rgba(255,255,255,.8);font-size:12px;
}
.video-progress{flex:1;height:4px;background:rgba(255,255,255,.15);border-radius:3px;position:relative;overflow:visible}
.video-progress-fill{position:absolute;left:0;top:0;bottom:0;width:38%;background:#fff;border-radius:3px}
.video-progress-mark{position:absolute;top:-2px;width:3px;height:8px;background:var(--claude);border-radius:2px}
.video-progress-label{
  position:absolute;top:-28px;transform:translateX(-50%);
  padding:3px 7px;border-radius:999px;
  background:rgba(18,16,23,.78);border:1px solid rgba(255,255,255,.18);
  color:#fff;font-size:10.5px;font-weight:700;white-space:nowrap;
  box-shadow:0 8px 22px rgba(0,0,0,.22);
}
.video-progress-label::after{
  content:"";position:absolute;left:50%;bottom:-5px;transform:translateX(-50%);
  border:5px solid transparent;border-top-color:rgba(18,16,23,.78);border-bottom:0;
}

.transcript-row{
  display:grid;grid-template-columns:50px 1fr;gap:12px;
  padding:9px 11px;border-radius:8px;font-size:12.5px;color:var(--ink-2);line-height:1.6;
  cursor:pointer;transition:background .12s var(--ease-out);
}
.transcript-row:hover{background:var(--surface-2)}
.transcript-row.active{background:var(--student-soft);color:var(--student-ink);font-weight:500;box-shadow:inset 2px 0 0 var(--student)}
.transcript-row.active strong{color:var(--ink)}
.transcript-time{font-variant-numeric:tabular-nums;color:var(--ink-4);font-size:11px;font-weight:600;letter-spacing:-.003em;padding-top:1px}
.transcript-row.active .transcript-time{color:var(--student)}

.summary-bullet{
  display:grid;grid-template-columns:20px 1fr;gap:10px;
  padding:9px 0;border-bottom:1px dashed var(--line);
  align-items:flex-start;
}
.summary-bullet:first-child{padding-top:2px}
.summary-bullet:last-child{border-bottom:0;padding-bottom:2px}
.sb-num{
  width:20px;height:20px;border-radius:6px;
  background:linear-gradient(140deg,#ece6f9,#d6ccf3);color:var(--xai);
  border:1px solid rgba(109,77,189,.15);
  display:grid;place-items:center;font-size:10.5px;font-weight:700;
  letter-spacing:-.01em;
  font-family:var(--font-serif);
  flex-shrink:0;
}
.sb-text{font-size:12.5px;line-height:1.65;color:var(--ink-2);padding-top:2px;letter-spacing:-.003em}
.sb-text em{background:var(--claude-soft);font-style:normal;padding:1px 4px;border-radius:4px;cursor:help;color:var(--claude-ink);font-weight:500;transition:background .15s var(--ease-out)}
.sb-text em:hover{background:rgba(193,95,60,.25)}

/* ── METACOGNITION ── */
.meta-check{
  padding:18px 20px;
  background:
    radial-gradient(300px 100px at 0% 0%, rgba(193,95,60,.1), transparent 60%),
    linear-gradient(180deg,#fbf0e5,#f6e3d6);
  border-radius:12px;
  border:1px solid rgba(193,95,60,.22);
  box-shadow:var(--shadow-1);
}
.meta-check-head{display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:11px;font-weight:700;color:var(--claude-ink);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.meta-check-q{font-size:14px;color:var(--claude-ink);margin-bottom:12px;font-weight:600;letter-spacing:-.01em;line-height:1.5}
.meta-scale{display:flex;gap:6px}
.meta-dot{
  flex:1;height:36px;border-radius:8px;background:#fff;border:1px solid rgba(193,95,60,.25);
  display:grid;place-items:center;font-size:11.5px;color:var(--claude-ink);cursor:pointer;
  transition:background .15s var(--ease-out), border-color .15s var(--ease-out), transform .1s var(--ease-out);
  font-weight:500;letter-spacing:-.003em;
}
.meta-dot:hover{background:#fffaf3;border-color:var(--claude)}
.meta-dot.selected{background:linear-gradient(180deg,#d07049,#b9572f);color:#fff;border-color:#a84d26;font-weight:700;box-shadow:0 1px 0 rgba(120,50,20,.25),inset 0 1px 0 rgba(255,255,255,.14)}

/* ── RUBRIC ── */
.rubric{width:100%;border-collapse:separate;border-spacing:0;font-size:12px;border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--surface)}
.rubric th{
  background:linear-gradient(180deg,var(--instructor-soft),rgba(231,228,246,.6));
  color:var(--instructor-ink);
  padding:10px 14px;text-align:left;font-weight:700;font-size:10.5px;
  letter-spacing:.06em;text-transform:uppercase;
  border-bottom:1px solid rgba(74,63,168,.12);
}
.rubric td{padding:12px 14px;border-bottom:1px solid var(--line);vertical-align:top;color:var(--ink-2);line-height:1.55}
.rubric tr:last-child td{border-bottom:0}
.rubric tr:hover td{background:rgba(244,242,236,.45)}
.rubric .crit{font-weight:700;color:var(--ink);letter-spacing:-.008em;font-size:12.5px}
.rubric .level{color:var(--ink-3);font-size:11.5px;line-height:1.55}
.rubric .match{
  display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;
  background:var(--xai-soft);color:var(--xai);font-size:10.5px;font-weight:700;
  border:1px solid rgba(109,77,189,.15);
  white-space:nowrap;
}

/* ── STUDENT ROW ── */
.student-row{
  display:grid;grid-template-columns:36px minmax(0,1.3fr) minmax(0,1fr) minmax(0,1.4fr) 108px 64px;gap:14px;align-items:center;
  padding:12px 14px;border-radius:10px;transition:background .12s var(--ease-out);
}
.student-row:hover{background:var(--surface-2)}
.student-row + .student-row{border-top:1px solid var(--line)}
.st-avatar{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,#f6f4ec,#eceae1);
  border:1px solid var(--line-2);
  display:grid;place-items:center;font-size:12px;font-weight:700;color:var(--ink-2);
  font-family:var(--font-serif);letter-spacing:-.02em;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.6);
}
.st-name{font-size:13px;font-weight:600;color:var(--ink);letter-spacing:-.008em;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.st-meta{font-size:11px;color:var(--ink-4);margin-top:2px;font-weight:500}
.st-bar{position:relative;height:5px;background:var(--surface-2);border-radius:999px;overflow:hidden;box-shadow:inset 0 0 0 1px var(--line)}
.st-bar-fill{height:100%;border-radius:999px;transition:width .6s var(--ease-out)}
.st-bar-fill.ok{background:linear-gradient(90deg,var(--ok),#3f9a75)}
.st-bar-fill.warn{background:linear-gradient(90deg,var(--warn),#c98c30)}
.st-bar-fill.danger{background:linear-gradient(90deg,var(--danger),#d05e3f)}
.st-score{font-size:11.5px;color:var(--ink-3);font-variant-numeric:tabular-nums;line-height:1.5;letter-spacing:-.003em}

.risk-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:-.003em;white-space:nowrap}
.risk-pill.high{background:var(--danger-soft);color:var(--danger);border:1px solid rgba(180,69,44,.18)}
.risk-pill.mid{background:var(--warn-soft);color:var(--warn);border:1px solid rgba(166,106,18,.18)}
.risk-pill.low{background:var(--ok-soft);color:var(--ok);border:1px solid rgba(47,122,90,.18)}
.risk-pill::before{content:"";width:5px;height:5px;border-radius:50%;background:currentColor}

/* ── HEATMAP ── */
.heatmap{display:grid;grid-template-columns:repeat(14, 1fr);gap:3px;margin-top:8px}
.heat-cell{aspect-ratio:1;border-radius:3px;background:var(--surface-2)}
.heat-cell.l1{background:#e4eee7}
.heat-cell.l2{background:#b9d9c4}
.heat-cell.l3{background:#7fbd97}
.heat-cell.l4{background:#47966a}
.heat-cell.l5{background:var(--student)}

/* ── SEGMENT ── */
.segment{display:flex;gap:2px;padding:3px;background:var(--surface-2);border-radius:9px;border:1px solid var(--line);box-shadow:inset 0 1px 0 rgba(20,18,14,.02)}
.segment button{flex:1;padding:5px 11px;border-radius:6px;font-size:11.5px;color:var(--ink-3);font-weight:500;transition:background .15s var(--ease-out), color .15s var(--ease-out), box-shadow .15s var(--ease-out);letter-spacing:-.003em}
.segment button:hover{color:var(--ink-2)}
.segment button.active{background:#fff;color:var(--ink);box-shadow:0 1px 0 rgba(20,18,14,.04),0 1px 2px rgba(20,18,14,.04);font-weight:600}

/* ── PAGES (views) ── */
.page{display:none;animation:fade .25s ease}
.page.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

/* ── EMPTY ── */
.empty-bar{
  display:flex;align-items:center;gap:10px;padding:12px 14px;
  background:var(--surface-2);border:1px dashed var(--line-2);border-radius:var(--radius);
  font-size:12px;color:var(--ink-3);
}

/* ── UTILS ── */
.muted{color:var(--ink-3)}
.row{display:flex;align-items:center;gap:8px}
.row-sb{display:flex;align-items:center;justify-content:space-between;gap:12px}
.spacer{flex:1}
hr.soft{border:0;border-top:1px solid var(--line);margin:14px 0}
.kbd-hint{font-size:10.5px;color:var(--ink-4)}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);
  padding:12px 20px;border-radius:999px;
  background:var(--ink);color:#fff;font-size:12.5px;font-weight:500;letter-spacing:-.003em;
  box-shadow:var(--shadow-3);z-index:100;
  transition:transform .3s var(--ease-out), opacity .3s var(--ease-out);
  opacity:0;
}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* ── SECTION HEADER ── */
.section-h{
  display:flex;align-items:center;gap:12px;margin:28px 0 14px;
}
.section-h h3{font-family:var(--font-serif);font-weight:700;font-size:16px;letter-spacing:-.025em;color:var(--ink)}
.section-h .dash{flex:1;height:1px;background:var(--line)}

/* scroll nicely */
.main::-webkit-scrollbar,.aside::-webkit-scrollbar,.nav::-webkit-scrollbar{width:8px;height:8px}
.main::-webkit-scrollbar-thumb,.aside::-webkit-scrollbar-thumb,.nav::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:8px}
.main::-webkit-scrollbar-thumb:hover,.aside::-webkit-scrollbar-thumb:hover,.nav::-webkit-scrollbar-thumb:hover{background:var(--ink-4)}

/* Intervention workflow */
.inter-card{
  padding:16px 18px;border:1px solid var(--line);border-radius:12px;background:var(--surface);
  box-shadow:var(--shadow-1);
}
.inter-steps{display:flex;gap:6px;margin-bottom:16px;padding:4px;background:var(--surface-2);border-radius:11px;border:1px solid var(--line)}
.inter-step{
  flex:1;display:flex;align-items:center;gap:9px;
  padding:9px 12px;border-radius:8px;background:transparent;
  font-size:11.5px;color:var(--ink-3);font-weight:600;letter-spacing:-.003em;
  transition:background .15s var(--ease-out),color .15s var(--ease-out);
}
.inter-step.done{background:transparent;color:var(--instructor-ink)}
.inter-step.done .num{background:var(--instructor-soft);color:var(--instructor-ink);border:1px solid rgba(74,63,168,.2)}
.inter-step.now{background:linear-gradient(180deg,#5246b8 0%,#3e33a0 100%);color:#fff;box-shadow:0 1px 0 rgba(40,30,120,.2),0 4px 12px -3px rgba(74,63,168,.4),inset 0 1px 0 rgba(255,255,255,.14)}
.inter-step .num{
  width:22px;height:22px;border-radius:7px;background:#fff;color:var(--ink-3);
  display:grid;place-items:center;font-size:11px;font-weight:700;
  border:1px solid var(--line-2);
  flex-shrink:0;
}
.inter-step.now .num{background:rgba(255,255,255,.18);color:#fff;border-color:rgba(255,255,255,.2);font-weight:800}

/* Message draft box */
.draft-box{
  border:1px solid var(--line-2);border-radius:12px;padding:16px 18px;
  background:var(--surface);
  box-shadow:var(--shadow-1);
}
.draft-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--line);gap:12px}
.draft-meta{font-size:11.5px;color:var(--ink-3);font-weight:500;letter-spacing:-.003em}
.draft-body{font-size:13.5px;line-height:1.8;color:var(--ink);letter-spacing:-.005em;font-weight:450;padding:4px 2px}
.draft-body .hl{background:var(--claude-soft);padding:1px 4px;border-radius:4px;cursor:help;position:relative;color:var(--claude-ink);font-weight:500;transition:background .15s var(--ease-out)}
.draft-body .hl:hover{background:rgba(193,95,60,.28)}
.draft-actions{display:flex;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line);align-items:center;flex-wrap:wrap}

/* Confidence gauge (circular) */
.conf-gauge{position:relative;width:58px;height:58px;display:grid;place-items:center;flex-shrink:0}
.conf-gauge svg{position:absolute;inset:0;transform:rotate(-90deg);width:58px;height:58px}
.conf-gauge .conf-track{stroke:var(--xai-soft);stroke-width:5;fill:none}
.conf-gauge .conf-fill{stroke:var(--xai);stroke-width:5;fill:none;stroke-linecap:round;transition:stroke-dasharray .6s var(--ease-out);filter:drop-shadow(0 1px 1px rgba(109,77,189,.25))}
.conf-gauge .conf-val{font-family:var(--font-serif);font-weight:800;font-size:15px;color:var(--xai);letter-spacing:-.02em;display:inline-flex;align-items:baseline;gap:1px}
.conf-gauge .conf-unit{font-size:9px;color:var(--xai);opacity:.7;font-weight:600}

/* Floating help */
.help-float{
  position:fixed;bottom:20px;right:20px;z-index:20;
  padding:10px 16px 10px 14px;border-radius:999px;
  background:rgba(255,255,255,.92);
  backdrop-filter:saturate(1.2) blur(8px);
  -webkit-backdrop-filter:saturate(1.2) blur(8px);
  border:1px solid var(--line);
  box-shadow:var(--shadow-2);
  display:flex;align-items:center;gap:9px;font-size:11.5px;color:var(--ink-2);font-weight:500;letter-spacing:-.003em;
  transition:transform .2s var(--ease-out), box-shadow .2s var(--ease-out);
}
.help-float:hover{transform:translateY(-1px);box-shadow:var(--shadow-3)}
.help-float::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--ok);box-shadow:0 0 0 3px var(--ok-soft);flex-shrink:0}

/* On hover xAI tooltips */
[data-tip]{position:relative}
[data-tip]:hover::after{
  content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
  white-space:normal;max-width:240px;width:max-content;
  padding:7px 10px;border-radius:8px;background:var(--ink);color:#fff;font-size:11.5px;font-weight:400;line-height:1.45;
  z-index:30;pointer-events:none;box-shadow:var(--shadow-3);
}
[data-tip]:hover::before{
  content:"";position:absolute;bottom:100%;left:50%;transform:translateX(-50%);
  border:5px solid transparent;border-top-color:var(--ink);
}
.app:not(.nav-collapsed):not(.ai-focus) .nav-item[data-tip]:hover::before,
.app:not(.nav-collapsed):not(.ai-focus) .nav-item[data-tip]:hover::after{display:none}
</style>
</head>
<body class="s-mode">

<div class="app" id="app" data-mode="default">
  <!-- ─────────── TOP BAR ─────────── -->
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark">C</div>
      <div>
        <div class="brand-name">Claritas</div>

/* ─────────────── STATE ─────────────── */
const state = {
  persona: 'student',       // 'student' | 'instructor'
  page: 'dashboard',
  navCollapsed: false,      // single source of truth: collapsed = AI focus mode
  aiContext: null,
  aiMode: 'view'
};

/* ─────────────── NAVIGATION DATA ─────────────── */
// Codex revision: expose the full IA. The menu should prove breadth first;
// pruning comes later after each screen has a sharper AI operations role.
const NAV = {
  student: [
    { group: '오늘', items: [
      { id:'dashboard', label:'대시보드', ico:'home', count:'' },

/* ─────────────── RENDERERS ─────────────── */
function renderNav(){
  const nav = document.getElementById('leftNav');
  const data = NAV[state.persona];
  const path = pathMini[state.persona];

  // Filter out hidden items (and drop empty groups). Hidden pages remain
  // routable via go() — this filter only affects nav surface.
  const visibleGroups = data
    .map(g => ({ ...g, items: g.items.filter(it => !it.hidden) }))
    .filter(g => g.items.length > 0);

  nav.innerHTML = `
    <div class="snb-head">
      <span class="snb-title">Navigation</span>
      <button class="snb-toggle" data-tip="${state.navCollapsed ? 'SNB 펼치기' : 'SNB 접기'}" aria-pressed="${state.navCollapsed ? 'true' : 'false'}" onclick="toggleSnb()" aria-label="${state.navCollapsed ? 'SNB 펼치기' : 'SNB 접기'}">

        <div class="path-card-title">${path.title}</div>
        <div class="path-steps">
          ${path.steps.map(s => `
            <div class="path-step ${s.state}">
              <span class="chip-dot"></span>
              <span>${s.label}</span>
            </div>

}

function switchPersona(p){
  state.persona = p;
  state.page = 'dashboard';
  state.aiContext = null;
  state.aiMode = 'view';
  document.body.classList.toggle('s-mode', p==='student');
  document.body.classList.toggle('i-mode', p==='instructor');
  document.querySelectorAll('.view-switch button').forEach(b => b.classList.toggle('active', b.dataset.persona===p));
  document.getElementById('avatarInitial').textContent = p==='student'?'S':'P';
  renderNav();
  renderPage();
}

function go(id){
  state.page = id;
  state.aiContext = null;
  state.aiMode = 'view';
  renderNav();
  renderPage();
}

function syncShellMode(){
  const app = document.getElementById('app');
  // navCollapsed is the single source of truth; ai-expanded / ai-focus are derived
  app.classList.toggle('nav-collapsed', state.navCollapsed);
  app.classList.toggle('ai-expanded', state.navCollapsed);
  app.classList.toggle('ai-focus', state.navCollapsed);
  app.dataset.mode = state.navCollapsed ? 'focus' : 'default';
}

function toggleSnb(){
  state.navCollapsed = !state.navCollapsed;
  syncShellMode();
  renderNav();
  renderPage();
}

// openAiContext: idempotent-open. Always enters focus mode; never toggles closed.
// Replaces the old expandAiPanel(). Used by AI evidence CTAs throughout the app.
function openAiContext(targetId, mode='view'){
  state.aiContext = targetId || `${state.persona}.${state.page}`;
  state.aiMode = mode;
  if(!state.navCollapsed){
    state.navCollapsed = true;
    syncShellMode();
    renderNav();
    renderPage();
  } else {
    renderPage();
  }
  const aside = document.getElementById('rightAside');
  if(aside) aside.scrollTop = 0;
}

function exitFocusMode(){
  if(state.navCollapsed){
    state.navCollapsed = false;
    syncShellMode();
    renderNav();
    renderPage();
  }
}

function currentPageLabel(){
  const groups = NAV[state.persona] || [];
  for(const group of groups){
    const item = group.items.find(it => it.id === state.page);
    if(item) return `${group.group} / ${item.label}`;
  }
  return state.persona === 'student' ? '오늘 / 대시보드' : '오늘 / 티칭 홈';
}

document.addEventListener('keydown', e => {
  if(e.key !== 'Escape') return;
  if(!state.navCollapsed) return;
  const active = document.activeElement;
  if(active){
    const tag = active.tagName;
    if(tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT') return;
    if(active.isContentEditable) return;
  }
  exitFocusMode();
});

document.addEventListener('click', e => {
  const badge = e.target.closest('.ai-badge');
  if(!badge) return;
  e.preventDefault();
  e.stopPropagation();
  openAiContext(badge.dataset.aiTarget, badge.dataset.aiMode || 'view');
  showToast('AI 패널에서 판단 근거를 열었습니다');
}, true);

function renderPage(){
  const main = document.getElementById('mainContent');
  const aside = document.getElementById('rightAside');
  const key = state.persona + '.' + state.page;
  const tpl = PAGES[key] || PAGES[state.persona+'.dashboard'];
  main.innerHTML = `${state.navCollapsed ? `<div class="focus-breadcrumb">${icon('sparkle',12,2)} AI Focus · ${currentPageLabel()}</div>` : ''}${tpl.main()}`;
  aside.innerHTML = `${aiPanelToolbar()}${state.navCollapsed ? focusModeDock() : ''}${tpl.aside()}`;
  document.querySelector('.app').classList.remove('no-aside');
  if(tpl.noAside){ document.querySelector('.app').classList.add('no-aside'); }
}

function aiMeta({intent='VIEW', role='Detect', confidence='', note=''}) {
  return `
    <div class="ai-meta-line">
      <span class="ai-intent">${intent}</span>
      <span class="ai-role">${role}</span>
      ${confidence ? `<span>신뢰도 ${confidence}</span>` : ''}

}

function aiEvidence(text) {
  return `<div class="ai-evidence-strip"><span class="confidence-dot"></span><span>${text}</span></div>`;
}

function aiActionStack({label='DECIDE', primary='적용', secondary='수정해서 적용', tertiary='보류', target='', mode='decide'}) {
  const ctx = target ? `'${target}'` : 'undefined';
  return `
    <div class="ai-action-stack">
      <span class="ai-action-label">${label}</span>
      <button class="btn btn-sm" onclick="event.stopPropagation();openAiContext(${ctx}, '${mode}');showToast('${primary} 준비')">${primary}</button>
      <button class="btn btn-sm btn-ghost" onclick="event.stopPropagation();openAiContext(${ctx}, '${mode}');showToast('${secondary} 준비')">${secondary}</button>
      <button class="btn btn-sm btn-ghost" onclick="event.stopPropagation();showToast('${tertiary} 기록')">${tertiary}</button>
    </div>
  `;
}

      <div class="ai-panel-label">AI Panel</div>

function focusModeDock(){
  const key = state.persona + '.' + state.page;
  const ctxKey = state.aiContext || key;
  const ctx = FOCUS_CONTEXT[ctxKey] || FOCUS_CONTEXT[key] || FOCUS_CONTEXT[state.persona + '.dashboard'];
  const roleLabel = state.persona === 'student' ? '학습자 AI Focus' : '교수자 AI Focus';
  const primaryBtn = state.persona === 'student' ? '계획 반영' : '검토 시작';
  // DOM order follows spec: Judgment → Action → Evidence → Uncertainty → Measurement → [execute] → Override
  return `
    <section class="focus-dock" aria-label="Expanded AI panel">
      <div class="focus-dock-head">
        <div>
          <div class="focus-dock-eyebrow">${roleLabel}</div>
          <div class="focus-dock-title">${ctx.title}</div>
          <div class="ai-meta-line" style="margin-top:6px">
            <span class="ai-intent">${(state.aiMode || 'view').toUpperCase()}</span>
            <span class="ai-role">${ctxKey}</span>
          </div>
        </div>
      </div>
      <div class="focus-primary">
        <div class="focus-row">
          <div class="focus-key">Judgment</div>
          <div class="focus-val"><strong>${ctx.judgment}</strong></div>
        </div>
        <div class="focus-row">
          <div class="focus-key">Action</div>
          <div class="focus-val">${ctx.action}</div>
        </div>
      </div>
      <div class="focus-detail">
        <details open>
          <summary>Evidence · 근거 이벤트</summary>
          <div class="focus-detail-body"><ul>${ctx.evidence.map(e => `<li>${e}</li>`).join('')}</ul></div>
        </details>
        <details>
          <summary>Uncertainty · 불확실성</summary>
          <div class="focus-detail-body">${ctx.uncertainty}</div>

/* xAI 5요소 footer helper — 모델 버전 · 측정 계획 · Mei-waku */

/* Subject badge palette — Figma-style 2-tone gradient + Korean initial */
const SUBJECTS = {
  data:     {ch:'데', from:'#dcf0e4', to:'#bfe1cd', ink:'#1f5c40'},
  linalg:   {ch:'수', from:'#e2e0f5', to:'#cfcaec', ink:'#2d2478'},
  ml:       {ch:'ML', from:'#ece6f9', to:'#d6ccf3', ink:'#4a3aa0'},
  writing:  {ch:'글', from:'#f6e3d6', to:'#efcdb7', ink:'#7a3620'},
  viz:      {ch:'시', from:'#dff0e7', to:'#b9dac8', ink:'#15604a'},
  exp:      {ch:'실', from:'#e9eee1', to:'#d1dabf', ink:'#4a5a2a'},
  story:    {ch:'스', from:'#f6dfdf', to:'#edc5c5', ink:'#8a3333'},
  seminar:  {ch:'文', from:'#e8e6e0', to:'#d4d0c4', ink:'#3d3c38'}
};
function subjectBadge(key, size=52){
  const s = SUBJECTS[key] || SUBJECTS.data;
  const fs = s.ch.length>1 ? Math.round(size*0.36) : Math.round(size*0.44);
  return `<div class="course-thumb" style="width:${size}px;height:${size}px;background:linear-gradient(145deg,${s.from} 0%,${s.to} 100%);color:${s.ink};box-shadow:inset 0 0 0 1px rgba(0,0,0,.04),inset 0 1px 0 rgba(255,255,255,.5),0 1px 0 rgba(20,18,14,.04);font-family:var(--font-serif);font-weight:800;font-size:${fs}px;letter-spacing:-.03em">${s.ch}</div>`;
}

function timeHeat(){
  const days=['월','화','수','목','금','토','일'];
  const rand=[
    [20,30,40,60,50,40,20,10],
    [30,50,80,90,70,50,30,20],
    [40,60,85,95,75,55,25,15],
    [35,55,82,92,72,52,28,18],
    [25,45,65,72,60,40,30,22],
    [10,15,25,35,40,50,60,45],
    [20,25,30,35,40,40,50,35],
  ];
  return `
    <div style="display:grid;grid-template-columns:26px repeat(8,1fr);gap:3px;margin-top:10px;font-size:10px;color:var(--ink-3)">
      <div></div><div>9</div><div>11</div><div>13</div><div>15</div><div>17</div><div>19</div><div>21</div><div>23</div>

        ${rand[i].map(v => {
          const lv = v<25?'l1':v<45?'l2':v<65?'l3':v<85?'l4':'l5';

}

function heatCells(rows, cols){
  let out='';
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const r1 = (Math.sin(r*3+c)+1)/2;
      const base = c===5?0.2:0.55; // week 6 intentionally low
      const v = Math.max(0, Math.min(1, base + (r1-0.5)*0.6));
      const lv = v<0.15?'':v<0.3?'l1':v<0.5?'l2':v<0.7?'l3':v<0.88?'l4':'l5';
      out += `<div class="heat-cell ${lv}"></div>`;
    }
  }
  return out;
}

/* ═══════════════════════════════════════════════════════════
   TOAST
   ═══════════════════════════════════════════════════════════ */
let toastTimer;
function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

/* Keyboard: ⌘K focuses search */
document.addEventListener('keydown', e => {
  if((e.metaKey||e.ctrlKey) && e.key.toLowerCase()==='k'){
    e.preventDefault();
    document.querySelector('.search-bar').style.borderColor = 'var(--claude)';
    setTimeout(() => document.querySelector('.search-bar').style.borderColor = '', 700);
    showToast('Claritas 검색 활성 — 원하는 건 자연어로 물어보세요');
  }
});
